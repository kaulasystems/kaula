# Per-package release via Trusted Publishing (no API tokens), triggered by
# tags of the form <package>/vX.Y.Z (e.g. kaula-core/v0.1.0).
#
# Non-negotiables enforced here (CLAUDE.md → Publishing rules):
# - commercial package names are blocked from this workflow entirely
# - release order follows dependency direction (kaula-core first)
# - wheel namespace check + seam check gate every release
# - TestPyPI + clean-venv smoke install before PyPI

name: Release

on:
  push:
    tags:
      - "kaula-*/v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag into package + version
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="${TAG%%/v*}"
          VERSION="${TAG##*/v}"
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Block commercial packages from the public pipeline
        run: |
          case "${{ steps.parse.outputs.pkg }}" in
            kaula-sandbox-hardened|kaula-memory-cloud|kaula-mcp-governed|kaula-governance|kaula-audit-cloud|kaula-healing-network)
              echo "::error::${{ steps.parse.outputs.pkg }} is commercial and never publishes to PyPI" && exit 1 ;;
          esac
          test -d "packages/${{ steps.parse.outputs.pkg }}" || { echo "::error::unknown package"; exit 1; }

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install workspace
        run: uv sync

      - name: Seam check
        run: uv run python scripts/check_seam.py

      - name: Release-order check (kaula deps already on PyPI)
        run: uv run python scripts/check_release_deps.py "${{ steps.parse.outputs.pkg }}"

      - name: Tests
        run: uv run pytest packages

      - name: Build sdist + wheel
        run: uv build --package "${{ steps.parse.outputs.pkg }}" --out-dir dist/

      - name: Wheel namespace check
        run: uv run python scripts/check_wheel.py dist/*.whl

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Smoke install from TestPyPI in a clean venv
        run: |
          PKG="${{ steps.parse.outputs.pkg }}"
          VERSION="${{ steps.parse.outputs.version }}"
          IMPORT_PATH="kaula.$(echo "${PKG#kaula-}" | tr '-' '_')"
          uv venv /tmp/smoke
          for i in 1 2 3 4 5; do
            VIRTUAL_ENV=/tmp/smoke uv pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "${PKG}==${VERSION}" && break
            echo "TestPyPI not consistent yet; retry $i" && sleep 30
          done
          /tmp/smoke/bin/python -c "import ${IMPORT_PATH}; print('${IMPORT_PATH} OK')"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
