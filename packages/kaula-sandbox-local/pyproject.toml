[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kaula-sandbox-local"
version = "0.1.0"
description = "Reference Kaula Sandbox: local Docker execution for repair candidates"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["kaula-core>=0.1,<0.2"]

# Install-time registration (resolved by kaula.core.Registry; config overrides)
[project.entry-points."kaula.implementations"]
sandbox = "kaula.sandbox_local:DockerSandbox"

[tool.hatch.build.targets.wheel]
packages = ["src/kaula"]
