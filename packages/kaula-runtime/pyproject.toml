[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kaula-runtime"
version = "0.1.0"
description = "Kaula runtime adapters: tool-call interception, healing trigger, pause-on-failure"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
# The interception hook (HealingToolWrapper) and pause ledger are
# framework-free and always available. CrewAI is only needed for
# kaula.runtime.crewai_adapter — install it as the `crewai` extra.
dependencies = [
    "kaula-core>=0.1,<0.2",
    "kaula-self-healing>=0.1,<0.2",
]

[project.optional-dependencies]
crewai = ["crewai>=0.80"]

[tool.hatch.build.targets.wheel]
packages = ["src/kaula"]
