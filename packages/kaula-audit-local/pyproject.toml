[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kaula-audit-local"
version = "0.1.0"
description = "Reference Kaula AuditSink: append-only, hash-chained audit trail with rollback index"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["kaula-core>=0.1,<0.2"]

[tool.hatch.build.targets.wheel]
packages = ["src/kaula"]
